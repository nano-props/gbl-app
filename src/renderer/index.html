<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- frame-ancestors omitted: it's only effective in HTTP headers,
         not <meta>, and Chromium logs a noisy warning when it appears
         here. We're a file:// app that never embeds anything in a
         frame, so the directive carries no real value either way. -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self';" />
    <title>GBL</title>
    <!-- Plain <script src=...> (not type=module) so vite copies it
         from public/ verbatim instead of bundling. Runs synchronously
         in document order, so data-theme is set before the stylesheet
         link below resolves. -->
    <script src="./boot.js"></script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
